name: CascadeSeeder Lite

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cascadeseeder:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[cascadeseeder]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run harness
        run: node harnesses/cascadeseeder-lite/scripts/run-folderwalker.mjs
