name: CascadeSeeder Lite

on:
  push:
    branches: [build]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cascadeseeder-lite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cascadeseeder:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[cascadeseeder]') }}
    env:
      REQUIRE_MODEL: "false"
      MODEL_PROVIDER: "nvidia"
      NVIDIA_MODEL: "minimaxai/minimax-m3"
      NVIDIA_BASE_URL: "https://integrate.api.nvidia.com/v1"
      NVIDIA_MAX_TOKENS: "4096"
      NVIDIA_TEMPERATURE: "0.7"
      NVIDIA_TOP_P: "0.95"
      NVIDIA_TIMEOUT_SECONDS: "120"
      LLAMA_N_PREDICT: "900"
      LLAMA_TEMP: "0.7"
      LLAMA_CTX_SIZE: "4096"
      LLAMA_THREADS: "2"
      LIVE_MONITOR_PORT: "8080"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential git curl

      - name: Start live monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          mkdir -p .agent/runtime/live
          node harnesses/cascadeseeder-lite/live/live-log.mjs reset
          node harnesses/cascadeseeder-lite/live/live-log.mjs event live-monitor running "starting local monitor"
          node harnesses/cascadeseeder-lite/live/monitor-server.mjs > .agent/runtime/live/monitor-server.log 2>&1 &
          echo $! > .agent/runtime/live/monitor-server.pid
          curl -L --retry 3 https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o "$RUNNER_TEMP/cloudflared"
          chmod +x "$RUNNER_TEMP/cloudflared"
          "$RUNNER_TEMP/cloudflared" tunnel --url "http://127.0.0.1:${LIVE_MONITOR_PORT}" --no-autoupdate > .agent/runtime/live/cloudflared.log 2>&1 &
          echo $! > .agent/runtime/live/cloudflared.pid
          LIVE_URL=""
          for i in $(seq 1 30); do
            LIVE_URL=$(grep -Eo 'https://[-a-zA-Z0-9.]+\.trycloudflare\.com' .agent/runtime/live/cloudflared.log | head -n 1 || true)
            if [ -n "$LIVE_URL" ]; then
              break
            fi
            sleep 1
          done
          echo "${LIVE_URL}" > .agent/runtime/live/public-url
          if [ -n "$LIVE_URL" ]; then
            node harnesses/cascadeseeder-lite/live/live-log.mjs event live-monitor done "${LIVE_URL}"
            DISCORD_MESSAGE="Live session visible here: ${LIVE_URL}" node harnesses/cascadeseeder-lite/live/post-discord.mjs
          else
            node harnesses/cascadeseeder-lite/live/live-log.mjs event live-monitor blocked "cloudflared url not detected"
          fi

      - name: Prepare CascadeSeeder prompt
        run: |
          node harnesses/cascadeseeder-lite/live/live-log.mjs event prepare running "building prompt"
          node harnesses/cascadeseeder-lite/scripts/run-folderwalker.mjs --prepare
          node harnesses/cascadeseeder-lite/live/live-log.mjs event prepare done "prompt ready"

      - name: Run NVIDIA NIM model once
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          node harnesses/cascadeseeder-lite/live/live-log.mjs event nvidia running "calling NVIDIA NIM"
          python3 harnesses/cascadeseeder-lite/python/run_nvidia_once.py
          if [ -s .agent/runtime/cascadeseeder-model-output.txt ]; then
            node harnesses/cascadeseeder-lite/live/live-log.mjs event nvidia done "NVIDIA output ready"
          else
            node harnesses/cascadeseeder-lite/live/live-log.mjs event nvidia skipped "no NVIDIA output"
          fi

      - name: Fallback to llama.cpp if needed
        env:
          HF_MODEL_URL: ${{ secrets.HF_MODEL_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -s .agent/runtime/cascadeseeder-model-output.txt ]; then
            node harnesses/cascadeseeder-lite/live/live-log.mjs event llama skipped "model output already exists"
          else
            node harnesses/cascadeseeder-lite/live/live-log.mjs event llama running "fallback download build infer"
            python3 harnesses/cascadeseeder-lite/python/run_llama_once.py
            node harnesses/cascadeseeder-lite/live/live-log.mjs event llama done "fallback step finished"
          fi

      - name: Apply CascadeSeeder output
        run: |
          node harnesses/cascadeseeder-lite/live/live-log.mjs event apply running "writing scoped output"
          node harnesses/cascadeseeder-lite/scripts/run-folderwalker.mjs --apply
          node harnesses/cascadeseeder-lite/live/live-log.mjs event apply done "scoped output written"

      - name: Print full run logs
        if: always()
        run: |
          node harnesses/cascadeseeder-lite/live/live-log.mjs event logs running "printing logs" || true
          if [ -f .agent/runtime/cascadeseeder-run-id ]; then
            RUN_ID="$(cat .agent/runtime/cascadeseeder-run-id)"
            echo "=== CascadeSeeder full run log ==="
            cat "ideas/generated-runs/${RUN_ID}/full-run-log.md" || true
          fi
          echo "=== NVIDIA NIM run log ==="
          cat ".agent/runtime/nvidia-run-log.md" || true
          echo "=== llama.cpp run log ==="
          cat ".agent/runtime/llama-run-log.md" || true
          echo "=== live events ==="
          cat ".agent/runtime/live/events.jsonl" || true
          node harnesses/cascadeseeder-lite/live/live-log.mjs event logs done "logs printed" || true

      - name: Upload run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cascadeseeder-lite-run
          path: |
            ideas/generated-runs/**
            .agent/runtime/nvidia-run-log.md
            .agent/runtime/llama-run-log.md
            .agent/runtime/live/**
            .agent/turn-ledger/**

      - name: Commit generated idea output
        run: |
          node harnesses/cascadeseeder-lite/live/live-log.mjs event commit running "committing generated output"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ideas scopes .agent/scheduled/lanes .agent/run-log.md .agent/turn-ledger
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            node harnesses/cascadeseeder-lite/live/live-log.mjs event commit done "no changes"
          else
            git commit -m "chore(cascadeseeder): write idea run [cascadeseeder] [skip ci]"
            git push
            node harnesses/cascadeseeder-lite/live/live-log.mjs event commit done "pushed generated output"
          fi

      - name: Hold live monitor briefly
        if: always()
        run: |
          node harnesses/cascadeseeder-lite/live/live-log.mjs event hold running "live monitor will stay up for up to 120 seconds"
          for i in $(seq 1 120); do
            if [ -f .agent/runtime/live/exit-requested ]; then
              node harnesses/cascadeseeder-lite/live/live-log.mjs event hold done "exit button requested shutdown"
              exit 0
            fi
            sleep 1
          done
          node harnesses/cascadeseeder-lite/live/live-log.mjs event hold done "120 second hold complete"

      - name: Post final Discord summary
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          node harnesses/cascadeseeder-lite/live/live-log.mjs event workflow done "workflow finishing" || true
          RUN_ID="unknown"
          if [ -f .agent/runtime/cascadeseeder-run-id ]; then
            RUN_ID="$(cat .agent/runtime/cascadeseeder-run-id)"
          fi
          DISCORD_MESSAGE="CascadeSeeder run complete. Run ID: ${RUN_ID}" node harnesses/cascadeseeder-lite/live/post-discord.mjs
